name: Build cafe-apiservice

on:
  push:
    branches: [main]
    paths:
      - "cafe-apiservice/**"
  pull_request:
    paths:
      - "cafe-apiservice/**"

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: cafe-apiservice
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/cafe-apiservice:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
